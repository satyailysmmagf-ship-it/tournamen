<body>

<nav class="nav">
  <div class="wrap nav-inner">
    <a href="index.html" class="brand">

      <span>
        CoffeMC
        <small>Java &amp; Bedrock</small>
      </span>
    </a>

    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="index.html#rules">Rules</a>
      <a href="index.html#tournaments">Tournaments</a>
      <a href="report.html">Report</a>
      <div class="auth-nav-slot"></div>
    </div>

    <a href="index.html" class="nav-cta desktop-only">Back to Server</a>

    <button class="menu-btn" onclick="toggleMenu()" aria-label="Toggle menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>

  <div class="wrap">
    <div id="menu">
      <a href="index.html">Home</a>

      <a href="report.html">Report</a>
      <div class="auth-nav-slot"></div>

</nav>

<section class="auth-section">
  <div class="auth-card">
    <p class="eyebrow">Account verification</p>
    <h1 id="verifyTitle">Verifying your email...</h1>
    <p class="auth-sub" id="verifySub">Hang tight, this only takes a second.</p>
    <div class="form-msg" id="verifyMsg"></div>
    <div class="auth-switch" id="verifyLink" style="display:none">
      <a href="login.html">Go to login</a>
    </div>
  </div>
</section>

<footer>
  <div class="wrap footer-inner">
    <span>&copy; 2026 CoffeMC. Not affiliated with Mojang or Microsoft.</span>
    <div class="footer-links">
      <a href="index.html">Home</a>
      <a href="index.html#tournaments">Tournaments</a>
      <a href="index.html#rules">Rules</a>
    </div>
  </div>
</footer>

<script src="auth.js"></script>
<script src="script.js"></script>
<script>
  (async function(){
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");
    const titleEl = document.getElementById("verifyTitle");
    const subEl = document.getElementById("verifySub");
    const msgEl = document.getElementById("verifyMsg");
    const linkEl = document.getElementById("verifyLink");

    if(!token){
      titleEl.textContent = "Missing verification token";
      subEl.textContent = "This link is missing its token. Please use the exact link from your email.";
      linkEl.style.display = "block";
      return;
    }

    try{
      const res = await apiFetch(`/auth/verify-email?token=${encodeURIComponent(token)}`);
      const data = await res.json();

      if(!res.ok){
        titleEl.textContent = "Verification failed";
        subEl.textContent = "";
        msgEl.textContent = data.error || "This verification link is invalid or has expired.";
        msgEl.className = "form-msg err show";
        linkEl.style.display = "block";
        setTimeout(() => { window.location.href = "login.html?verified=0"; }, 2500);
        return;
      }

      titleEl.textContent = "Email verified!";
      subEl.textContent = "Your account is ready — redirecting you to log in...";
      msgEl.textContent = "Success!";
      msgEl.className = "form-msg ok show";
      linkEl.style.display = "block";
      setTimeout(() => { window.location.href = "login.html?verified=1"; }, 1500);
    }catch(err){
      console.error(err);
      titleEl.textContent = "Couldn't reach the server";
      subEl.textContent = "Please try clicking the link again in a moment.";
      linkEl.style.display = "block";
    }
  })();
</script>
</body>
</html>
